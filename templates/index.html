<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>耘智链 - 多Agent智慧种植服务平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; color: #1f2937; }
        .header { background: linear-gradient(135deg, #059669, #10b981); color: #fff; padding: 28px 20px; text-align: center; position: relative; overflow: hidden; }
        .header::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px); background-size: 20px 20px; opacity: 0.3; pointer-events: none; }
        .header h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; position: relative; z-index: 1; }
        .header p { font-size: 14px; opacity: 0.95; position: relative; z-index: 1; }
        .container { max-width: 720px; margin: 0 auto; padding: 16px; }
        .agents { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
        .agent-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-left: 4px solid #10b981; transition: transform 0.15s; }
        .agent-card:active { transform: scale(0.98); }
        .agent-card h3 { font-size: 15px; color: #065f46; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .agent-card p { font-size: 13px; color: #6b7280; line-height: 1.5; }
        .chat-box { background: #fff; border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); overflow: hidden; display: flex; flex-direction: column; height: 520px; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; background: #f9fafb; }
        .msg { margin-bottom: 14px; display: flex; flex-direction: column; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-items: flex-end; }
        .msg.bot { align-items: flex-start; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14.5px; line-height: 1.7; word-break: break-word; white-space: pre-wrap; }
        .msg.user .bubble { background: #10b981; color: #fff; border-bottom-right-radius: 4px; }
        .msg.bot .bubble { background: #fff; color: #1f2937; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; }
        .agent-tag { font-size: 11px; color: #047857; background: #d1fae5; padding: 3px 10px; border-radius: 10px; margin-bottom: 5px; display: inline-block; font-weight: 600; }
        .input-area { display: flex; padding: 12px; border-top: 1px solid #e5e7eb; background: #fff; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 11px 14px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .input-area input:focus { border-color: #10b981; }
        .input-area button { padding: 11px 20px; background: #10b981; color: #fff; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 500; }
        .input-area button:active { background: #059669; }
        .empty { text-align: center; color: #9ca3af; padding: 50px 0; font-size: 14px; line-height: 2; }
        .quick-chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 16px 12px; background: #f9fafb; }
        .chip { background: #fff; border: 1px solid #d1d5db; color: #374151; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .chip:hover { border-color: #10b981; color: #059669; }
        .loading-dot::after { content: ""; animation: dots 1.4s infinite steps(5, end); }
        @keyframes dots { 0%,20% { content: ""; } 40% { content: "."; } 60% { content: ".."; } 80%,100% { content: "..."; } }
        .footer-note { text-align: center; font-size: 12px; color: #9ca3af; padding: 10px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌾 耘智链</h1>
        <p>基于多Agent协作的中小农户智慧种植服务平台</p>
    </div>
    <div class="container">
        <div class="agents">
            <div class="agent-card"><h3>🌱 种植规划Agent</h3><p>制定种植计划、农事节点提醒</p></div>
            <div class="agent-card"><h3>🐛 病虫害诊断Agent</h3><p>识别病虫害、提供防治方案</p></div>
            <div class="agent-card"><h3>📈 市场行情Agent</h3><p>查询农产品价格与走势分析</p></div>
            <div class="agent-card"><h3>🚚 产销对接Agent</h3><p>对接收购商与销售渠道</p></div>
        </div>
        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="empty">
                    👋 欢迎使用耘智链！<br>
                    点击下方快捷问题，或直接输入您的问题
                </div>
            </div>
            <div class="quick-chips" id="chips">
                <span class="chip" onclick="quickSend(this)">甘蔗什么时候种？</span>
                <span class="chip" onclick="quickSend(this)">叶子发黄有斑点怎么办？</span>
                <span class="chip" onclick="quickSend(this)">柑橘现在什么价？</span>
                <span class="chip" onclick="quickSend(this)">怎么找收购商？</span>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="请输入您的问题..." onkeydown="if(event.key==='Enter')send()">
                <button onclick="send()">发送</button>
            </div>
        </div>
        <div class="footer-note">耘智链 · 科技助农 · 乡村振兴</div>
    </div>
    <script>
        let sessionId = localStorage.getItem("yzc_session") || Math.random().toString(36).slice(2,10);
        localStorage.setItem("yzc_session", sessionId);

        function appendMsg(role, text, agentName) {
            const box = document.getElementById("messages");
            const empty = box.querySelector(".empty");
            if(empty) empty.remove();
            const div = document.createElement("div");
            div.className = "msg " + role;
            let tag = role === "bot" && agentName ? `<span class="agent-tag">${agentName}</span>` : "";
            div.innerHTML = tag + `<div class="bubble">${text}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }

        function quickSend(el) {
            document.getElementById("userInput").value = el.textContent;
            send();
        }

        async function send() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if(!text) return;
            appendMsg("user", text);
            input.value = "";
            const loadingDiv = appendMsg("bot", "思考中<span class=\'loading-dot\'></span>", "调度中心");

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({message: text, session_id: sessionId})
                });
                const data = await res.json();
                if(data.status === "ok"){
                    loadingDiv.querySelector(".bubble").innerHTML = data.reply;
                    loadingDiv.querySelector(".agent-tag").textContent = data.agent_name;
                } else {
                    loadingDiv.querySelector(".bubble").textContent = "服务异常，请稍后重试";
                }
            } catch(e) {
                loadingDiv.querySelector(".bubble").textContent = "网络错误：" + e.message;
            }
        }
    </script>
</body>
</html>
